<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard Audit A11Y Renowify</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    font-family: "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 2rem;
  }

  h1 {
    font-size: 2rem;
    margin-bottom: 1rem;
  }

  h2 {
    margin-top: 2rem;
    margin-bottom: 1rem;
  }

  .grid {
    display: grid;
    gap: 1.5rem;
  }

  @media (min-width: 900px) {
    .grid-3 {
      grid-template-columns: repeat(3, 1fr);
    }
    .grid-2 {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  .card {
    background: white;
    padding: 1.5rem;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }

  .criticity-box {
    display: flex;
    align-items: center;
    gap: .5rem;
    font-size: 1.2rem;
  }

  .yellow { color: #FFC107; }
  .orange { color: #FF9800; }
  .red { color: #F44336; }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 1rem;
  }

  table th, table td {
    padding: .5rem;
    border-bottom: 1px solid #ddd;
    text-align: left;
  }

  .trend-up {  color: #F44336; font-weight: bold; }
  .trend-down { color: #4CAF50; font-weight: bold; }
  .trend-equal { color: #999; font-weight: bold; }
</style>
</head>

<body>

<h1>Dashboard Audit A11Y Renowify</h1>

<div id="summary" class="grid grid-2"></div>

<h2>Évolution historique</h2>
<canvas id="chartEvolution" height="100"></canvas>

<h2>Top pages par criticité</h2>
<div id="topPages" class="grid grid-2"></div>

<h2>Problèmes les plus fréquents par criticité</h2>
<div id="topProblemsContainer" class="grid grid-2"</div>

<script>
async function loadReports() {
  const files = await fetch('../reports/')
    .then(r => r.text());

  const jsonFiles = [...files.matchAll(/report-[\d\-]+\.json/g)]
    .map(m => m[0])
    .sort();

  const reports = [];
  console.log(jsonFiles);
  for (const file of jsonFiles) {
    const data = await fetch('../reports/' + file).then(r => r.json());
    reports.push({ file, ...data });
  }

  return reports;
}

function trendIcon(diff) {
  if (diff > 0) return `<span class="trend-up">↑</span>`;
  if (diff < 0) return `<span class="trend-down">↓</span>`;
  return `<span class="trend-equal">=</span>`;
}

function renderSummary(latest) {
  const container = document.getElementById('summary');
  
    function trendColor(diff) {
		if (diff > 0) return `<span style="color:#F44336;">↑ (+${diff})</span>`;
		if (diff < 0) return `<span style="color:#4CAF50;">↓ (${diff})</span>`;
		return `<span style="color:#999;">= (0)</span>`;
	  }

  container.innerHTML = `

    <div class="card">
      <h3 class="criticity-box orange">🟠 Criticité 2</h3>
      <p>Total : <strong>${latest.totals[2]}</strong></p>
      ${latest.trend ? `Tendance : ${trendColor(latest.trend[2].diff)}` : ''}
    </div>

    <div class="card">
      <h3 class="criticity-box red">🔴 Criticité 3</h3>
      <p>Total : <strong>${latest.totals[3]}</strong></p>
      ${latest.trend ? `Tendance : ${trendColor(latest.trend[3].diff)}` : ''}
    </div>
  `;
}

function renderTopPages(latest, previous) {
  const container = document.getElementById('topPages');

  function trendColor(diff) {
    if (diff > 0) return `<span style="color:#F44336;">↑ (+${diff})</span>`;
    if (diff < 0) return `<span style="color:#4CAF50;">↓ (${diff})</span>`;
    return `<span style="color:#999;">= (0)</span>`;
  }

  function tableFor(list, criticityLevel, colorClass, picto) {
    return `
      <div class="card">
        <h3 class="criticity-box ${colorClass}">${picto} Criticité ${criticityLevel}</h3>
        <table>
          <tr>
            <th>Page</th>
            <th>Nb</th>
            <th>Tendance</th>
          </tr>
          ${list.slice(0, 10).map(p => `
            <tr>
              <td>${p.title}<br><small>${p.url}</small></td>
              <td><strong>${p.count}</strong></td>
              <td>${trendColor(latest.pageTrend?.[p.id]?.[`criticity${criticityLevel}`] ?? 0)}</td>
            </tr>
          `).join('')}
        </table>
      </div>
    `;
  }

  container.innerHTML = `
    ${tableFor(latest.topPages.criticity2, 2, "orange", "🟠")}
    ${tableFor(latest.topPages.criticity3, 3, "red", "🔴")}
  `;
}

function renderTopProblems(latest, previous) {
  const container = document.getElementById('topProblemsContainer');

  function trendColor(diff) {
    if (diff > 0) return `<span style="color:#F44336;">↑ (+${diff})</span>`;
    if (diff < 0) return `<span style="color:#4CAF50;">↓ (${diff})</span>`;
    return `<span style="color:#999;">= (0)</span>`;
  }

  function tableFor(list, criticityLevel, colorClass, picto) {
    return `
      <div class="card">
        <h3 class="criticity-box ${colorClass}">${picto} Criticité ${criticityLevel}</h3>
        <table>
          <tr>
            <th>Code</th>
            <th>Message</th>
            <th>Occurrences</th>
            <th>Tendance</th>
          </tr>
          ${list.slice(0, 10).map(p => {
            const prev = previous?.topProblems?.find(x => x.code === p.code && x.message === p.message);
            const diff = prev ? p.count - prev.count : 0;

            return `
              <tr>
                <td>${p.code || ""}</td>
                <td>${p.message}</td>
                <td><strong>${p.count}</strong></td>
                <td>${trendColor(diff)}</td>
              </tr>
            `;
          }).join('')}
        </table>
      </div>
    `;
  }

  const c2 = latest.topProblems.filter(p => p.criticity === 2);
  const c3 = latest.topProblems.filter(p => p.criticity === 3);

  container.innerHTML = `
    ${tableFor(c2, 2, "orange", "🟠")}
    ${tableFor(c3, 3, "red", "🔴")}
  `;
}



function renderEvolution(reports) {
  const labels = reports.map(r => r.generatedAt);
  //const c1 = reports.map(r => r.totals[1]);
  const c2 = reports.map(r => r.totals[2]);
  const c3 = reports.map(r => r.totals[3]);

  new Chart(document.getElementById('chartEvolution'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Criticité 2', data: c2, borderColor: '#FF9800', tension: .2 },
        { label: 'Criticité 3', data: c3, borderColor: '#F44336', tension: .2 }
      ]
    }
  });
}

(async () => {
  const reports = await loadReports();
  const latest = reports[reports.length - 1];

  renderSummary(latest);
  renderTopPages(latest, reports[reports.length - 2]);
  renderTopProblems(latest, reports[reports.length - 2]);
  renderEvolution(reports);
})();
</script>

</body>
</html>
